<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reportes — Autódromo Monterrey</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="../assets/logo.png" alt="Autódromo Monterrey" class="sidebar-logo-img" />
    </div>
    <nav class="nav">
      <a href="index.html"         class="nav-link">Dashboard</a>
      <a href="pilotos.html"       class="nav-link">Pilotos</a>
      <a href="carreras.html"      class="nav-link">Carreras</a>
      <a href="inscripciones.html" class="nav-link">Inscripciones</a>
      <a href="reportes.html"      class="nav-link activo">Reportes</a>
      <a href="usuarios.html"      class="nav-link solo-admin" style="display:none">Usuarios</a>
    </nav>
    <div class="sidebar-footer">
      <div class="usuario-info">
        <div class="usuario-avatar" id="usuarioAvatar"></div>
        <div><div class="usuario-nombre" id="usuarioNombre"></div><div class="usuario-rol" id="usuarioRol"></div></div>
      </div>
      <button class="btn-logout" onclick="cerrarSesion()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between">
      <div>
        <h1 class="page-titulo">Reportes</h1>
        <p class="page-sub">Análisis y cortes de inscripciones</p>
      </div>
      <button class="btn-secundario" onclick="window.print()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,9 6,2 18,2 18,9"/><path d="M6,18H4a2,2,0,0,1-2-2V11a2,2,0,0,1,2-2H20a2,2,0,0,1,2,2v5a2,2,0,0,1-2,2H18"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimir
      </button>
    </div>

    <!-- Controles -->
    <div class="card" style="padding:20px;margin-bottom:24px">
      <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
        <div style="flex:1;min-width:200px">
          <label class="etiqueta">Etapa / Carrera</label>
          <select class="select" id="selCarrera"></select>
        </div>
        <button class="btn-primario" onclick="cargarReporteCategoria()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Reporte por Categoría
        </button>
        <button class="btn-secundario" id="btnCorteGeneral" style="display:none;border-color:rgba(230,57,70,0.5);color:#e63946" onclick="cargarCorteGeneral()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Corte General
        </button>
      </div>
    </div>

    <div id="contenidoReporte"></div>
  </main>

  <script src="../admin/config.js"></script>
  <script>
    requerirSesion();
    const usuario = obtenerUsuario();
    document.getElementById('usuarioAvatar').textContent = usuario.nombre[0].toUpperCase();
    document.getElementById('usuarioNombre').textContent = usuario.nombre;
    document.getElementById('usuarioRol').textContent    = usuario.rol;
    if (usuario.rol === 'admin') {
      document.querySelectorAll('.solo-admin').forEach(el => el.style.display = 'flex');
    }
    if (usuario.rol === 'admin' || usuario.rol === 'inscripciones') {
      document.getElementById('btnCorteGeneral').style.display = 'flex';
    }

    async function inicializar() {
      const carreras = await apiFetch('/carreras');
      document.getElementById('selCarrera').innerHTML =
        carreras.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
    }

    async function cargarReporteCategoria() {
      const carreraId = document.getElementById('selCarrera').value;
      if (!carreraId) return mostrarToast('Selecciona una carrera', 'advertencia');
      try {
        const data = await apiFetch(`/reportes/por-categoria?carrera_id=${carreraId}`);
        const contenido = document.getElementById('contenidoReporte');
        const grupos = Object.entries(data.agrupado);
        if (grupos.length === 0) {
          contenido.innerHTML = '<div class="card" style="padding:40px;text-align:center;color:#555">Sin inscripciones para esta carrera</div>';
          return;
        }
        contenido.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <h2 style="font-family:'Bebas Neue';font-size:1.8rem;letter-spacing:0.08em">Reporte por Categoría</h2>
            <span style="font-size:0.75rem;padding:3px 12px;border-radius:9999px;background:rgba(230,57,70,0.15);color:#e63946;border:1px solid rgba(230,57,70,0.3)">${data.total} total</span>
          </div>
          ${grupos.map(([nombre, grupo]) => `
            <div class="card" style="margin-bottom:14px;padding:0;overflow:hidden">
              <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #1e1e1e">
                <div style="display:flex;align-items:center;gap:10px">
                  <span style="width:10px;height:10px;border-radius:50%;background:${grupo.categoria.color};flex-shrink:0"></span>
                  <span style="font-family:'Bebas Neue';font-size:1.5rem;color:${grupo.categoria.color}">${nombre}</span>
                  ${grupo.categoria.descripcion ? `<span style="font-size:0.75rem;color:#555">${grupo.categoria.descripcion}</span>` : ''}
                </div>
                <div style="display:flex;gap:16px;font-size:0.78rem;font-family:'Barlow',sans-serif">
                  <span style="color:#4ade80">✓ ${grupo.pagados} pagados</span>
                  <span style="color:#fbbf24">⏳ ${grupo.total - grupo.pagados} pendientes</span>
                  <span style="color:#fff;font-weight:700">${grupo.total} total</span>
                </div>
              </div>
              <div class="tabla-wrap">
                <table class="tabla">
                  <thead><tr><th>#</th><th>Piloto</th><th>Sangre</th><th>Vehículo</th><th>Estatus</th></tr></thead>
                  <tbody>
                    ${grupo.pilotos.map(r => `
                      <tr>
                        <td><span class="num-piloto">${r.numero_piloto}</span></td>
                        <td><strong>${r.piloto_nombre}</strong></td>
                        <td style="font-family:'Bebas Neue';font-size:1rem;color:#e63946">${r.tipo_sangre}</td>
                        <td style="color:#666">${r.vehiculo}</td>
                        <td>${badgeEstatus(r.estatus)}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            </div>
          `).join('')}
        `;
      } catch (err) { mostrarToast(err.message, 'error'); }
    }

    async function cargarCorteGeneral() {
      const carreraId = document.getElementById('selCarrera').value;
      if (!carreraId) return mostrarToast('Selecciona una carrera', 'advertencia');
      try {
        const data = await apiFetch(`/reportes/corte-general?carrera_id=${carreraId}`);
        const c = data.contenido;
        document.getElementById('contenidoReporte').innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
            <h2 style="font-family:'Bebas Neue';font-size:1.8rem;letter-spacing:0.08em">Corte General</h2>
            <div style="text-align:right">
              <div style="font-size:0.72rem;color:#555">Generado: ${new Date(data.generado_en).toLocaleString('es-MX')}</div>
              <div style="font-size:0.72rem;color:#555">Por: ${data.generado_por}</div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
            ${[
              ['Total Inscritos', data.resumen.total, '#fff'],
              ['Pagados',         data.resumen.pagados, '#4ade80'],
              ['Pendientes',      data.resumen.pendientes, '#fbbf24'],
              ['Ingresos',        '$' + data.resumen.ingresos.toLocaleString('es-MX', {minimumFractionDigits:2}), '#e63946'],
            ].map(([label, val, color]) => `
              <div class="stat-card">
                <div style="font-family:'Bebas Neue';font-size:2.2rem;color:${color}">${val}</div>
                <div style="font-size:0.68rem;color:#555;letter-spacing:0.1em;text-transform:uppercase;margin-top:2px">${label}</div>
              </div>
            `).join('')}
          </div>
          <div class="card tabla-card">
            <div style="padding:14px 18px;border-bottom:1px solid #1e1e1e;font-family:'Bebas Neue';font-size:1.2rem;letter-spacing:0.06em">Por Categoría</div>
            <div class="tabla-wrap">
              <table class="tabla">
                <thead><tr><th>Categoría</th><th>Total</th><th>Pagados</th><th>Pendientes</th></tr></thead>
                <tbody>
                  ${Object.entries(data.por_categoria).map(([nombre, g]) => `
                    <tr>
                      <td><span style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:${g.categoria.color}"></span><strong>${nombre}</strong></span></td>
                      <td style="font-family:'Bebas Neue';font-size:1.1rem">${g.total}</td>
                      <td style="color:#4ade80;font-family:'Bebas Neue';font-size:1.1rem">${g.pagados}</td>
                      <td style="color:#fbbf24;font-family:'Bebas Neue';font-size:1.1rem">${g.total - g.pagados}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;
      } catch (err) { mostrarToast(err.message, 'error'); }
    }

    inicializar();
  </script>
</body>
</html>
