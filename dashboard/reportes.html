<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reportes — Autódromo Monterrey</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
  <style>
    .corte-pill {
      display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px;
      border-radius: 9999px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    }
    .corte-pagado      { background: rgba(21,128,61,0.12); color: #4ade80; border: 1px solid rgba(21,128,61,0.3); }
    .corte-pendiente   { background: rgba(146,64,14,0.12);  color: #fbbf24; border: 1px solid rgba(146,64,14,0.3); }
    .corte-desc        { background: rgba(185,28,28,0.12);   color: #f87171; border: 1px solid rgba(185,28,28,0.3); }
    .metodo-tag { font-size:0.68rem;color:var(--muted);padding:2px 6px;border:1px solid var(--borde);border-radius:4px }
    .stat-corte { background:var(--dark);border:1px solid var(--borde);border-radius:10px;padding:16px 18px;text-align:center }
    .denom-row { display:grid; grid-template-columns:70px 1fr 90px 110px; gap:10px; align-items:center; padding:8px 0; border-bottom:1px solid var(--borde); }
    .denom-input { width:100%; padding:8px 10px; background:var(--dark); border:1px solid var(--borde); border-radius:6px; color:var(--texto); font-size:0.9rem; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; color-adjust: exact; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="../assets/logo.png" alt="Autódromo Monterrey" class="sidebar-logo-img" />
    </div>
    <nav class="nav">
      <a href="index.html"         class="nav-link">Dashboard</a>
      <a href="pilotos.html"       class="nav-link">Pilotos</a>
      <a href="campeonatos.html"   class="nav-link">Campeonatos</a>
      <a href="inscripciones.html" class="nav-link">Inscripciones</a>
      <a href="reportes.html"      class="nav-link activo">Reportes</a>
      <a href="resultados.html"    class="nav-link">Resultados</a>
      <a href="formularios.html"   class="nav-link">Formularios</a>
      <a href="usuarios.html"      class="nav-link solo-admin" style="display:none">Usuarios</a>
    </nav>
    <div class="sidebar-footer">
      <div class="usuario-info">
        <div class="usuario-avatar" id="usuarioAvatar"></div>
        <div><div class="usuario-nombre" id="usuarioNombre"></div><div class="usuario-rol" id="usuarioRol"></div></div>
      </div>
      <button class="btn-logout" onclick="cerrarSesion()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between">
      <div>
        <h1 class="page-titulo">Reportes</h1>
        <p class="page-sub">Análisis y cortes de inscripciones</p>
      </div>
      <button class="btn-secundario" onclick="window.print()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,9 6,2 18,2 18,9"/><path d="M6,18H4a2,2,0,0,1-2-2V11a2,2,0,0,1,2-2H20a2,2,0,0,1,2,2v5a2,2,0,0,1-2,2H18"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimir
      </button>
    </div>

    <!-- Controles en cascada: campeonato → etapa -->
    <div class="card" style="padding:20px;margin-bottom:24px">
      <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
        <div style="flex:1;min-width:180px">
          <label class="etiqueta">Campeonato</label>
          <select class="select" id="selCampeonato" onchange="onCampChange()"></select>
        </div>
        <div style="flex:1;min-width:180px">
          <label class="etiqueta">Etapa</label>
          <select class="select" id="selEtapa">
            <option value="">Todas las etapas</option>
          </select>
        </div>
        <div style="flex:1;min-width:140px">
          <label class="etiqueta">Categoría (opcional)</label>
          <select class="select" id="selCategoria">
            <option value="">Todas</option>
          </select>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn-primario" onclick="cargarReporteCategoria()" title="Lista de inscritos de la etapa, agrupados por categoría">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            Por Categoría
          </button>
          <button class="btn-secundario" id="btnCorte" style="border-color:rgba(74,222,128,0.5);color:#4ade80" onclick="cargarCorteGeneral()" title="Ingresos, pagados/pendientes y desglose por método de pago">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Corte de Caja
          </button>
          <button class="btn-secundario" style="border-color:rgba(168,85,247,0.5);color:#7e22ce" onclick="cargarClasificacionAdmin()" title="Tabla de posiciones del campeonato: puntos, victorias y mejor resultado por piloto en la categoría seleccionada">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18,15 12,9 6,15"/></svg>
            Clasificación
          </button>
          <button class="btn-secundario" id="btnArqueo" style="border-color:rgba(96,165,250,0.5);color:#60a5fa" onclick="cargarArqueo()" title="Contador de billetes y monedas para el precorte de caja">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></svg>
            Precorte
          </button>
        </div>
      </div>
    </div>

    <div id="contenidoReporte"></div>
  </main>

  <script src="../admin/config.js"></script>
  <script>
    requerirSesion();
    const usuario = obtenerUsuario();
    document.getElementById('usuarioAvatar').textContent = usuario.nombre[0].toUpperCase();
    document.getElementById('usuarioNombre').textContent = usuario.nombre;
    document.getElementById('usuarioRol').textContent    = usuario.rol;
    if (usuario.rol === 'admin') {
      document.querySelectorAll('.solo-admin').forEach(el => el.style.display = 'flex');
    }
    if (usuario.rol === 'torre') {
      document.getElementById('btnCorte').style.display = 'none';
      document.getElementById('btnArqueo').style.display = 'none';
      document.querySelector('a[href="formularios.html"]').style.display = 'none';
    }

    let todasCats = [];

    async function inicializar() {
      let camps, cats;
      try {
        [camps, cats] = await Promise.all([apiFetch('/campeonatos'), apiFetch('/categorias')]);
      } catch (err) {
        mostrarToast(err.message || 'Error al cargar campeonatos y categorías', 'error');
        document.getElementById('selCampeonato').innerHTML = '<option value="">Error al cargar — recarga la página</option>';
        return;
      }
      todasCats = cats;

      const selCamp = document.getElementById('selCampeonato');
      selCamp.innerHTML =
        '<option value="">Selecciona un campeonato...</option>' +
        '<option value="todos">⬛ Todos los campeonatos</option>' +
        camps.map(c => `<option value="${c.id}">${esc(c.nombre)}</option>`).join('');

      document.getElementById('selCategoria').innerHTML = '<option value="">Todas</option>' +
        cats.map(c => `<option value="${c.id}">${esc(c.nombre)}</option>`).join('');

      // URL params: si viene etapa_id, seleccionar automáticamente
      const params  = new URLSearchParams(window.location.search);
      const etapaId = params.get('etapa_id');
      if (etapaId) {
        // Buscar el campeonato de esta etapa en los camps y pre-seleccionar
        // Intentamos cargando la etapa, luego auto-cargar
        try {
          // Buscar a cual campeonato pertenece
          for (const c of camps) {
            const etapas = await apiFetch(`/campeonatos/${c.id}/etapas`);
            const et = etapas.find(e => String(e.id) === etapaId);
            if (et) {
              selCamp.value = c.id;
              await onCampChange();
              document.getElementById('selEtapa').value = etapaId;
              cargarCorteGeneral();
              return;
            }
          }
        } catch {}
      }

      if (camps.length > 0) {
        selCamp.value = camps[0].id;
        await onCampChange();
      }
    }

    async function onCampChange() {
      const campId = document.getElementById('selCampeonato').value;
      const selEtapa = document.getElementById('selEtapa');
      selEtapa.innerHTML = '<option value="">Todas las etapas</option>';
      selEtapa.disabled = (campId === 'todos' || !campId);
      if (!campId || campId === 'todos') return;
      try {
        const etapas = await apiFetch(`/campeonatos/${campId}/etapas`);
        selEtapa.innerHTML = '<option value="">Todas las etapas</option>' +
          etapas.map(e => `<option value="${e.id}">Etapa ${e.numero} — ${esc(e.nombre)} (${formatFecha(e.fecha)})</option>`).join('');
      } catch {}
    }

    function getQueryParams() {
      const campId  = document.getElementById('selCampeonato').value;
      const etapaId = document.getElementById('selEtapa').value;
      const catId   = document.getElementById('selCategoria').value;
      let qs = '';
      if (campId === 'todos')  qs = 'todos=true';
      else if (etapaId)        qs = `etapa_id=${etapaId}`;
      else if (campId)         qs = `campeonato_id=${campId}`;
      if (catId) qs += (qs ? '&' : '') + `categoria_id=${catId}`;
      return { campId, etapaId, catId, qs };
    }

    async function cargarReporteCategoria() {
      const { qs } = getQueryParams();
      if (!qs) return mostrarToast('Selecciona un campeonato o etapa', 'advertencia');
      try {
        const data = await apiFetch(`/reportes/por-categoria?${qs}`);
        const grupos = Object.entries(data.agrupado);
        const div = document.getElementById('contenidoReporte');
        if (grupos.length === 0) {
          div.innerHTML = '<div class="card" style="padding:40px;text-align:center;color:var(--muted)">Sin inscripciones</div>';
          return;
        }
        const costo = data.costo_etapa || 0;
        div.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <h2 style="font-family:'Bebas Neue';font-size:1.8rem;letter-spacing:0.08em">Reporte por Categoría</h2>
            <div style="display:flex;gap:10px;align-items:center">
              ${costo > 0 ? `<span style="font-size:0.78rem;color:#4ade80">Costo: $${costo.toLocaleString('es-MX',{minimumFractionDigits:2})}/inscripción</span>` : ''}
              <span style="font-size:0.75rem;padding:3px 12px;border-radius:9999px;background:rgba(37,99,235,0.15);color:var(--rojo);border:1px solid rgba(37,99,235,0.3)">${data.total} total</span>
            </div>
          </div>
          ${grupos.map(([nombre, g]) => `
            <div class="card" style="margin-bottom:14px;padding:0;overflow:hidden">
              <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--borde)">
                <div style="display:flex;align-items:center;gap:10px">
                  <span style="width:10px;height:10px;border-radius:50%;background:${g.categoria.color};flex-shrink:0"></span>
                  <span style="font-family:'Bebas Neue';font-size:1.5rem;color:${g.categoria.color}">${esc(nombre)}</span>
                  ${g.categoria.descripcion ? `<span style="font-size:0.75rem;color:var(--muted)">${esc(g.categoria.descripcion)}</span>` : ''}
                </div>
                <div style="display:flex;gap:16px;font-size:0.78rem;align-items:center;flex-wrap:wrap">
                  <span style="color:#4ade80">✓ ${g.pagados} pagados</span>
                  <span style="color:#fbbf24">⏳ ${g.total - g.pagados} pendientes</span>
                  <span style="color:var(--texto);font-weight:700">${g.total} total</span>
                  ${costo > 0 ? `
                    <span style="color:#4ade80;font-weight:700">$${g.total_cobrado.toLocaleString('es-MX',{minimumFractionDigits:2})}</span>
                    <span style="color:var(--muted)">/ $${g.total_esperado.toLocaleString('es-MX',{minimumFractionDigits:2})}</span>
                  ` : ''}
                </div>
              </div>
              <div class="tabla-wrap">
                <table class="tabla">
                  <thead><tr><th>#</th><th>Piloto</th><th>Sangre</th><th>Vehículo</th><th>Estatus</th><th>Método</th></tr></thead>
                  <tbody>
                    ${g.pilotos.map(r => `
                      <tr>
                        <td><span class="num-piloto">${r.numero_piloto}</span></td>
                        <td><strong>${esc(r.piloto_nombre)}</strong></td>
                        <td style="font-family:'Bebas Neue';font-size:1rem;color:var(--rojo)">${r.tipo_sangre}</td>
                        <td style="color:var(--muted)">${esc(r.vehiculo)}${r.modelo_vehiculo ? ' '+esc(r.modelo_vehiculo) : ''}</td>
                        <td>${badgeEstatus(r.estatus)}</td>
                        <td>${r.metodo_pago ? `<span class="metodo-tag">${esc(r.metodo_pago)}</span>` : '<span style="color:var(--muted)">—</span>'}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            </div>
          `).join('')}
        `;
      } catch (err) { mostrarToast(err.message, 'error'); }
    }

    const DENOMINACIONES = [
      { tipo: 'Billete', valor: 1000 }, { tipo: 'Billete', valor: 500 }, { tipo: 'Billete', valor: 200 },
      { tipo: 'Billete', valor: 100 }, { tipo: 'Billete', valor: 50 },   { tipo: 'Billete', valor: 20 },
      { tipo: 'Moneda',  valor: 20 },  { tipo: 'Moneda',  valor: 10 },  { tipo: 'Moneda',  valor: 5 },
      { tipo: 'Moneda',  valor: 2 },   { tipo: 'Moneda',  valor: 1 },
    ];

    async function cargarArqueo() {
      let efectivoEsperado = null;
      let contexto = '';
      const { qs } = getQueryParams();
      if (qs) {
        try {
          const data = await apiFetch(`/reportes/corte-general?${qs}`);
          efectivoEsperado = data.resumen.ingresosEfectivo;
          const campId = document.getElementById('selCampeonato').value;
          contexto = campId === 'todos' ? 'Todos los campeonatos'
            : data.etapa ? `${data.campeonato?.nombre || ''} — Etapa ${data.etapa.numero}: ${data.etapa.nombre}`
            : (data.campeonato?.nombre || '');
        } catch { /* si no hay contexto seleccionado, el arqueo funciona igual sin comparar */ }
      }

      document.getElementById('contenidoReporte').innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:8px">
          <div>
            <h2 style="font-family:'Bebas Neue';font-size:1.8rem;letter-spacing:0.08em;color:#60a5fa">Precorte — Arqueo de Efectivo</h2>
            ${contexto ? `<div style="font-size:0.8rem;color:var(--muted);margin-top:2px">${esc(contexto)}</div>` : ''}
          </div>
        </div>
        <div class="card" style="padding:20px">
          <div class="denom-row" style="border-bottom:2px solid var(--borde);font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:700">
            <div>Tipo</div><div>Denominación</div><div>Cantidad</div><div style="text-align:right">Subtotal</div>
          </div>
          ${DENOMINACIONES.map((d, i) => `
            <div class="denom-row">
              <div style="color:var(--muted);font-size:0.78rem">${d.tipo}</div>
              <div style="font-family:'Bebas Neue';font-size:1.2rem;color:${d.tipo==='Billete'?'#4ade80':'#fbbf24'}">$${d.valor}</div>
              <input class="denom-input" type="number" min="0" step="1" id="denom-${i}" oninput="actualizarArqueo()" placeholder="0" />
              <div id="sub-${i}" style="text-align:right;color:var(--muted);font-family:'Bebas Neue';font-size:1.1rem">$0</div>
            </div>
          `).join('')}
          <div style="display:flex;justify-content:flex-end;gap:32px;margin-top:20px;padding-top:16px;border-top:1px solid var(--borde);flex-wrap:wrap">
            ${efectivoEsperado !== null ? `
              <div style="text-align:right">
                <div style="font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em">Esperado en efectivo</div>
                <div style="font-family:'Bebas Neue';font-size:1.6rem;color:var(--muted)">$${efectivoEsperado.toLocaleString('es-MX',{minimumFractionDigits:2})}</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em">Diferencia</div>
                <div id="diferenciaArqueo" style="font-family:'Bebas Neue';font-size:1.6rem;color:var(--muted)">—</div>
              </div>
            ` : ''}
            <div style="text-align:right">
              <div style="font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em">Total contado</div>
              <div id="totalArqueo" style="font-family:'Bebas Neue';font-size:2.2rem;color:#60a5fa">$0.00</div>
            </div>
          </div>
        </div>
      `;
      window._arqueoEsperado = efectivoEsperado;
    }

    function actualizarArqueo() {
      let total = 0;
      DENOMINACIONES.forEach((d, i) => {
        const cant = parseInt(document.getElementById(`denom-${i}`).value) || 0;
        const sub = cant * d.valor;
        document.getElementById(`sub-${i}`).textContent = `$${sub.toLocaleString('es-MX')}`;
        total += sub;
      });
      document.getElementById('totalArqueo').textContent = `$${total.toLocaleString('es-MX',{minimumFractionDigits:2})}`;
      const esperado = window._arqueoEsperado;
      if (esperado !== null && esperado !== undefined) {
        const dif = total - esperado;
        const el = document.getElementById('diferenciaArqueo');
        el.textContent = `${dif >= 0 ? '+' : ''}$${dif.toLocaleString('es-MX',{minimumFractionDigits:2})}`;
        el.style.color = dif === 0 ? '#4ade80' : (dif > 0 ? '#fbbf24' : '#f87171');
      }
    }

    async function cargarCorteGeneral() {
      const { qs } = getQueryParams();
      if (!qs) return mostrarToast('Selecciona un campeonato o etapa', 'advertencia');
      try {
        const data = await apiFetch(`/reportes/corte-general?${qs}`);
        const c = data.resumen;
        const costo = data.costo || 0;
        const campId = document.getElementById('selCampeonato').value;
        const nombreContexto = campId === 'todos'
          ? 'Todos los campeonatos'
          : data.etapa
            ? `${data.campeonato?.nombre || ''} — Etapa ${data.etapa.numero}: ${data.etapa.nombre}`
            : (data.campeonato?.nombre || '');

        document.getElementById('contenidoReporte').innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:8px">
            <div>
              <h2 style="font-family:'Bebas Neue';font-size:1.8rem;letter-spacing:0.08em">Corte de Caja</h2>
              <div style="font-size:0.8rem;color:var(--muted);margin-top:2px">${esc(nombreContexto)}</div>
            </div>
            <div style="text-align:right;font-size:0.72rem;color:var(--muted)">
              <div>Generado: ${new Date(data.generado_en).toLocaleString('es-MX')}</div>
              <div>Por: ${esc(data.generado_por)}</div>
            </div>
          </div>

          <!-- Stats principales -->
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px">
            ${[
              ['Total',           c.total,                          'var(--texto)'],
              ['Pagados',         c.pagados,                        '#4ade80'],
              ['Pendientes',      c.pendientes,                     '#fbbf24'],
              ['Efectivo',        c.efectivo,                       '#60a5fa'],
              ['Transferencia',   c.transferencia,                  '#7e22ce'],
              ['Intercambio',     c.intercambio,                    '#c2410c'],
              ['Recaudado',       '$'+c.ingresos.toLocaleString('es-MX',{minimumFractionDigits:2}), '#4ade80'],
              ...(costo > 0 ? [['Esperado', '$'+c.esperado.toLocaleString('es-MX',{minimumFractionDigits:2}), 'var(--muted)']] : []),
            ].map(([label, val, color]) => `
              <div class="stat-corte">
                <div style="font-family:'Bebas Neue';font-size:1.9rem;color:${color};line-height:1.1">${val}</div>
                <div style="font-size:0.65rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:4px">${label}</div>
              </div>
            `).join('')}
          </div>

          <!-- Por categoría -->
          <div class="card" style="margin-bottom:16px;padding:0;overflow:hidden">
            <div style="padding:12px 18px;border-bottom:1px solid var(--borde);font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:0.06em">Resumen por Categoría</div>
            <div class="tabla-wrap">
              <table class="tabla">
                <thead><tr><th>Categoría</th><th>Total</th><th>Pagados</th><th>Pendientes</th></tr></thead>
                <tbody>
                  ${Object.entries(data.por_categoria).map(([nombre, g]) => `
                    <tr>
                      <td><span style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:${g.categoria.color}"></span><strong>${esc(nombre)}</strong></span></td>
                      <td style="font-family:'Bebas Neue';font-size:1.1rem">${g.total}</td>
                      <td style="color:#4ade80;font-family:'Bebas Neue';font-size:1.1rem">${g.pagados}</td>
                      <td style="color:#fbbf24;font-family:'Bebas Neue';font-size:1.1rem">${g.total - g.pagados}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>

          <!-- Lista completa: pagados primero, luego pendientes -->
          <div class="card" style="padding:0;overflow:hidden">
            <div style="padding:12px 18px;border-bottom:1px solid var(--borde);display:flex;align-items:center;justify-content:space-between">
              <span style="font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:0.06em">Lista de Pilotos</span>
              <div style="display:flex;gap:10px;font-size:0.72rem">
                <span class="corte-pill corte-pagado">${c.pagados} pagados</span>
                <span class="corte-pill corte-pendiente">${c.pendientes} pendientes</span>
              </div>
            </div>
            <div class="tabla-wrap">
              <table class="tabla">
                <thead><tr><th>#</th><th>Piloto</th><th>Sangre</th><th>Categoría</th><th>Estatus</th><th>Método</th><th>Monto</th><th>Fecha Pago</th></tr></thead>
                <tbody>
                  ${[...data.inscripciones].sort((a,b) => {
                    if (a.estatus === 'Pagado' && b.estatus !== 'Pagado') return -1;
                    if (a.estatus !== 'Pagado' && b.estatus === 'Pagado') return 1;
                    return a.numero_piloto - b.numero_piloto;
                  }).map(r => `
                    <tr>
                      <td><span class="num-piloto">${r.numero_piloto}</span></td>
                      <td><strong>${esc(r.piloto_nombre)}</strong></td>
                      <td style="font-family:'Bebas Neue';font-size:1rem;color:var(--rojo)">${r.tipo_sangre}</td>
                      <td><span style="padding:2px 8px;border-radius:4px;font-size:0.7rem;font-weight:700;text-transform:uppercase;background:${r.categoria_color}22;color:${r.categoria_color};border:1px solid ${r.categoria_color}44">${esc(r.categoria_nombre)}</span></td>
                      <td>
                        ${r.estatus === 'Pagado'
                          ? '<span class="corte-pill corte-pagado">✓ Pagado</span>'
                          : r.estatus === 'Descalificado'
                            ? '<span class="corte-pill corte-desc">Descalif.</span>'
                            : '<span class="corte-pill corte-pendiente">Pendiente</span>'
                        }
                      </td>
                      <td>${r.metodo_pago ? `<span class="metodo-tag">${esc(r.metodo_pago)}</span>` : '<span style="color:var(--muted)">—</span>'}</td>
                      <td style="font-size:0.82rem;color:#4ade80">${r.monto_pago ? '$'+parseFloat(r.monto_pago).toLocaleString('es-MX',{minimumFractionDigits:2}) : (r.estatus === 'Pagado' && costo > 0 ? '$'+costo.toLocaleString('es-MX',{minimumFractionDigits:2}) : '—')}</td>
                      <td style="font-size:0.75rem;color:var(--muted)">${r.pagado_en ? new Date(r.pagado_en).toLocaleString('es-MX',{dateStyle:'short',timeStyle:'short'}) : '—'}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;
      } catch (err) { mostrarToast(err.message, 'error'); }
    }

    async function cargarClasificacionAdmin() {
      const campId = document.getElementById('selCampeonato').value;
      const catId  = document.getElementById('selCategoria').value;
      if (!campId || campId === 'todos') return mostrarToast('Selecciona un campeonato específico', 'advertencia');
      if (!catId) return mostrarToast('Selecciona una categoría', 'advertencia');
      try {
        const rows = await apiFetch(`/reportes/clasificacion?campeonato_id=${campId}&categoria_id=${catId}`);
        const selCamp = document.getElementById('selCampeonato');
        const selCat  = document.getElementById('selCategoria');
        const campNombre = selCamp.options[selCamp.selectedIndex]?.text || '';
        const catNombre  = selCat.options[selCat.selectedIndex]?.text  || '';
        const div = document.getElementById('contenidoReporte');
        if (!rows.length) {
          div.innerHTML = '<div class="card" style="padding:40px;text-align:center;color:var(--muted)">Sin resultados registrados en esta categoría</div>';
          return;
        }
        const colPos = i => i === 0 ? '#c9a84c' : i === 1 ? '#9ca3af' : i === 2 ? '#cd7f32' : 'var(--muted)';
        const medalla = i => i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `P${i+1}`;
        div.innerHTML = `
          <div style="margin-bottom:16px">
            <h2 style="font-family:'Bebas Neue';font-size:1.8rem;letter-spacing:0.08em">Clasificación</h2>
            <div style="font-size:0.8rem;color:var(--muted);margin-top:2px">${esc(campNombre)} — ${esc(catNombre)}</div>
          </div>
          <div class="card" style="padding:0;overflow:hidden">
            <div class="tabla-wrap">
              <table class="tabla">
                <thead><tr><th>Pos</th><th>#</th><th>Piloto</th><th>Pts</th><th>Carreras</th><th>Victorias</th><th>Mejor</th></tr></thead>
                <tbody>
                  ${rows.map((r, i) => `
                    <tr>
                      <td style="font-family:'Bebas Neue';font-size:1.3rem;color:${colPos(i)}">${medalla(i)}</td>
                      <td style="font-family:'Bebas Neue';font-size:1.2rem;color:var(--rojo)">${r.numero_piloto || '—'}</td>
                      <td><strong>${esc(r.nombre_completo)}</strong></td>
                      <td style="font-family:'Bebas Neue';font-size:1.3rem;color:var(--rojo)">${r.puntos_totales || 0}</td>
                      <td>${r.carreras_corridas || 0}</td>
                      <td>${r.victorias || 0}</td>
                      <td style="color:var(--muted)">${r.mejor_posicion ? 'P' + r.mejor_posicion : '—'}</td>
                    </tr>`).join('')}
                </tbody>
              </table>
            </div>
          </div>`;
      } catch (err) { mostrarToast(err.message, 'error'); }
    }

    inicializar();
  </script>
</body>
</html>
