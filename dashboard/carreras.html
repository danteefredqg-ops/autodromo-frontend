<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carreras — Autódromo Monterrey</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="../assets/logo.png" alt="Autódromo Monterrey" class="sidebar-logo-img" />
    </div>
    <nav class="nav">
      <a href="index.html"         class="nav-link">Dashboard</a>
      <a href="pilotos.html"       class="nav-link">Pilotos</a>
      <a href="carreras.html"      class="nav-link activo">Carreras</a>
      <a href="inscripciones.html" class="nav-link">Inscripciones</a>
      <a href="reportes.html"      class="nav-link">Reportes</a>
      <a href="usuarios.html"      class="nav-link solo-admin" style="display:none">Usuarios</a>
    </nav>
    <div class="sidebar-footer">
      <div class="usuario-info">
        <div class="usuario-avatar" id="usuarioAvatar"></div>
        <div><div class="usuario-nombre" id="usuarioNombre"></div><div class="usuario-rol" id="usuarioRol"></div></div>
      </div>
      <button class="btn-logout" onclick="cerrarSesion()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between">
      <div>
        <h1 class="page-titulo">Carreras</h1>
        <p class="page-sub" id="contador">Cargando...</p>
      </div>
      <button class="btn-primario solo-admin" id="btnNuevaCarrera" style="display:none" onclick="abrirModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nueva Carrera
      </button>
    </div>

    <!-- Filtros -->
    <div class="barra-filtros" style="margin-bottom:18px">
      <select class="select" id="filtroTorneo" onchange="filtrar()" style="max-width:220px">
        <option value="">Todos los torneos</option>
      </select>
      <select class="select" id="filtroModalidad" onchange="filtrar()" style="max-width:180px">
        <option value="">Todas las modalidades</option>
        <option>Milla</option>
        <option>1/4 Milla</option>
        <option>Óvalo</option>
        <option>Drag</option>
        <option>Libre</option>
      </select>
      <select class="select" id="filtroEstatus" onchange="filtrar()" style="max-width:180px">
        <option value="">Todos los estatus</option>
        <option>Programada</option>
        <option>En Curso</option>
        <option>Finalizada</option>
      </select>
    </div>

    <div id="gridCarreras" style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
      <div class="card" style="padding:32px;text-align:center;color:#555;grid-column:span 3">Cargando...</div>
    </div>
  </main>

  <!-- Modal crear / editar -->
  <div class="modal-overlay" id="modalCarrera" style="display:none">
    <div class="modal" style="max-width:480px">
      <div class="modal-header">
        <span class="modal-titulo" id="modalTitulo">Nueva Carrera</span>
        <button class="modal-cerrar" onclick="cerrarModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="grid-2">
          <div class="campo col-2">
            <label class="etiqueta">Nombre de la Etapa *</label>
            <input class="input" id="cNombre" placeholder="Ej: Etapa 1 — Copa Monterrey 2025" />
          </div>
          <div class="campo">
            <label class="etiqueta">Fecha *</label>
            <input class="input" type="date" id="cFecha" />
          </div>
          <div class="campo">
            <label class="etiqueta">Modalidad</label>
            <select class="select" id="cModalidad">
              <option value="Milla">Milla</option>
              <option value="1/4 Milla">1/4 Milla</option>
              <option value="Óvalo">Óvalo</option>
              <option value="Drag">Drag</option>
              <option value="Libre" selected>Libre</option>
            </select>
          </div>
          <div class="campo col-2">
            <label class="etiqueta">Torneo / Competencia</label>
            <input class="input" id="cTorneo" placeholder="Ej: Copa Monterrey 2025" list="listaTorneos" />
            <datalist id="listaTorneos"></datalist>
          </div>
          <div class="campo col-2">
            <label class="etiqueta">Ubicación</label>
            <input class="input" id="cUbicacion" value="Autódromo Monterrey" />
          </div>
          <div class="campo col-2">
            <label class="etiqueta">Descripción</label>
            <textarea class="textarea" id="cDescripcion" rows="2"></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secundario flex-1" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-primario flex-1" id="btnGuardar" onclick="guardarCarrera()">Crear Carrera</button>
      </div>
    </div>
  </div>

  <style>
    .badge-modalidad {
      display:inline-flex;align-items:center;gap:4px;
      padding:2px 8px;border-radius:4px;font-size:0.68rem;font-weight:700;letter-spacing:0.08em;
      background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.3);
    }
    .badge-estatus-prog     { background:rgba(85,85,85,0.2);color:#888;border:1px solid #333; }
    .badge-estatus-encurso  { background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3); }
    .badge-estatus-final    { background:rgba(100,100,100,0.1);color:#555;border:1px solid #222; }
    .badge-estatus-encurso::before {
      content:''; display:inline-block; width:6px; height:6px; border-radius:50%;
      background:#4ade80; margin-right:4px; animation:pulso 1.2s infinite;
    }
    @keyframes pulso { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .btn-estatus {
      width:100%;padding:7px;border-radius:7px;background:none;
      border:1px solid #1e1e1e;color:#555;font-family:'Barlow',sans-serif;
      font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
      cursor:pointer;transition:all 0.18s;display:flex;align-items:center;justify-content:center;gap:6px;
    }
    .btn-estatus:hover { border-color:#333;color:#fff; }
    .btn-editar-carrera {
      padding:5px 10px;border-radius:6px;background:none;border:1px solid #1e1e1e;
      color:#555;font-family:'Barlow',sans-serif;font-size:0.7rem;font-weight:700;
      letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:all 0.18s;
      display:inline-flex;align-items:center;gap:4px;
    }
    .btn-editar-carrera:hover { border-color:#444;color:#ccc; }
  </style>

  <script src="../admin/config.js"></script>
  <script>
    requerirSesion();
    const usuario = obtenerUsuario();
    const esAdmin = usuario.rol === 'admin';

    document.getElementById('usuarioAvatar').textContent = usuario.nombre[0].toUpperCase();
    document.getElementById('usuarioNombre').textContent = usuario.nombre;
    document.getElementById('usuarioRol').textContent    = usuario.rol;
    if (esAdmin) {
      document.querySelectorAll('.solo-admin').forEach(el => el.style.display = 'flex');
    }

    let todasLasCarreras = [];
    let editandoId = null;

    const MODALIDAD_COLORES = {
      'Milla':    { bg: 'rgba(245,158,11,0.15)', color: '#fbbf24', border: 'rgba(245,158,11,0.3)' },
      '1/4 Milla':{ bg: 'rgba(168,85,247,0.15)', color: '#c084fc', border: 'rgba(168,85,247,0.3)' },
      'Óvalo':    { bg: 'rgba(59,130,246,0.15)',  color: '#60a5fa', border: 'rgba(59,130,246,0.3)' },
      'Drag':     { bg: 'rgba(230,57,70,0.15)',   color: '#f87171', border: 'rgba(230,57,70,0.3)'  },
      'Libre':    { bg: 'rgba(85,85,85,0.15)',    color: '#888',    border: '#333'                  },
    };

    function badgeModalidad(m) {
      const c = MODALIDAD_COLORES[m] || MODALIDAD_COLORES['Libre'];
      return `<span style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:0.68rem;font-weight:700;letter-spacing:0.08em;background:${c.bg};color:${c.color};border:1px solid ${c.border}">${esc(m)}</span>`;
    }

    function badgeEstatus(s) {
      if (s === 'En Curso') return `<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:0.68rem;font-weight:700;letter-spacing:0.08em;background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3)"><span style="width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulso 1.2s infinite"></span>En Curso</span>`;
      if (s === 'Finalizada') return `<span style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:0.68rem;font-weight:700;letter-spacing:0.08em;background:rgba(100,100,100,0.1);color:#555;border:1px solid #222">Finalizada</span>`;
      return `<span style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:0.68rem;font-weight:700;letter-spacing:0.08em;background:rgba(85,85,85,0.2);color:#888;border:1px solid #333">Programada</span>`;
    }

    function siguienteEstatus(actual) {
      if (actual === 'Programada') return 'En Curso';
      if (actual === 'En Curso')   return 'Finalizada';
      return 'Programada';
    }

    function iconoEstatus(sig) {
      if (sig === 'En Curso')   return '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5,3 19,12 5,21"/></svg>';
      if (sig === 'Finalizada') return '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20,6 9,17 4,12"/></svg>';
      return '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1,4 1,10 7,10"/><path d="M3.51,15a9,9,0,1,0,.49-4.95"/></svg>';
    }

    async function cargar() {
      try {
        const carreras = await apiFetch('/carreras');
        todasLasCarreras = carreras;
        actualizarFiltroTorneos(carreras);
        renderizar(carreras);
      } catch (err) { mostrarToast(err.message, 'error'); }
    }

    function actualizarFiltroTorneos(carreras) {
      const torneos = [...new Set(carreras.map(c => c.torneo).filter(Boolean))].sort();
      const sel = document.getElementById('filtroTorneo');
      const val = sel.value;
      sel.innerHTML = '<option value="">Todos los torneos</option>' +
        torneos.map(t => `<option ${t === val ? 'selected' : ''}>${esc(t)}</option>`).join('');

      const dl = document.getElementById('listaTorneos');
      dl.innerHTML = torneos.map(t => `<option value="${esc(t)}">`).join('');
    }

    function filtrar() {
      const torneo    = document.getElementById('filtroTorneo').value;
      const modalidad = document.getElementById('filtroModalidad').value;
      const estatus   = document.getElementById('filtroEstatus').value;
      const filtradas = todasLasCarreras.filter(c =>
        (!torneo    || c.torneo    === torneo) &&
        (!modalidad || c.modalidad === modalidad) &&
        (!estatus   || c.estatus   === estatus)
      );
      renderizar(filtradas);
    }

    function renderizar(carreras) {
      document.getElementById('contador').textContent = `${carreras.length} etapa(s) registrada(s)`;
      const grid = document.getElementById('gridCarreras');
      if (carreras.length === 0) {
        grid.innerHTML = '<div class="card" style="padding:40px;text-align:center;color:#555;grid-column:span 3">Sin carreras para los filtros seleccionados</div>';
        return;
      }

      grid.innerHTML = carreras.map(c => {
        const sig = siguienteEstatus(c.estatus || 'Programada');
        const botones = esAdmin ? `
          <div style="display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid #1e1e1e">
            <button class="btn-editar-carrera" onclick="abrirEditar(${c.id})">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Editar
            </button>
            <button class="btn-editar-carrera" style="color:#e63946;border-color:rgba(230,57,70,0.3)" onclick="eliminarCarrera(${c.id}, '${esc(c.nombre).replace(/'/g,"\\'")}', ${c.total_inscritos})" title="Eliminar carrera">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/><path d="M10,11v6"/><path d="M14,11v6"/><path d="M9,6V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2"/></svg>
              Eliminar
            </button>
            <button class="btn-estatus" style="flex:1" onclick="cambiarEstatus(${c.id}, '${sig}', this)">
              ${iconoEstatus(sig)} Marcar "${sig}"
            </button>
          </div>` : '';

        return `
          <div class="card" style="position:relative;overflow:hidden;transition:border-color 0.2s" onmouseover="this.style.borderColor='rgba(230,57,70,0.35)'" onmouseout="this.style.borderColor='#1e1e1e'">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
              <div style="padding:8px;background:rgba(230,57,70,0.1);border-radius:8px">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e63946" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
              </div>
              ${badgeEstatus(c.estatus || 'Programada')}
            </div>

            ${c.torneo ? `<div style="font-size:0.68rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#e63946;margin-bottom:4px">${esc(c.torneo)}</div>` : ''}
            <h3 style="font-family:'Bebas Neue';font-size:1.3rem;letter-spacing:0.05em;line-height:1.2;margin-bottom:6px">${esc(c.nombre)}</h3>

            <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
              ${badgeModalidad(c.modalidad || 'Libre')}
              <span style="font-size:0.75rem;color:#555">${esc(c.ubicacion)}</span>
            </div>

            <div style="display:flex;align-items:center;justify-content:space-between;font-size:0.8rem">
              <span style="color:#666;display:flex;align-items:center;gap:4px">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                ${formatFecha(c.fecha)}
              </span>
              <span style="font-family:'Bebas Neue';font-size:1rem;display:flex;align-items:center;gap:4px">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#e63946" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                ${c.total_inscritos} inscritos
              </span>
            </div>
            ${botones}
          </div>`;
      }).join('');
    }

    async function cambiarEstatus(id, nuevoEstatus, btn) {
      const textoOriginal = btn.innerHTML;
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
      try {
        await apiFetch(`/carreras/${id}/estatus`, {
          method: 'PATCH',
          body: JSON.stringify({ estatus: nuevoEstatus }),
        });
        mostrarToast(`Carrera marcada como "${nuevoEstatus}"`);
        await cargar();
      } catch (err) {
        mostrarToast(err.message, 'error');
        btn.disabled = false; btn.innerHTML = textoOriginal;
      }
    }

    // ── Modal ────────────────────────────────────────────────────────────────────

    function abrirModal() {
      editandoId = null;
      document.getElementById('modalTitulo').textContent = 'Nueva Carrera';
      document.getElementById('btnGuardar').textContent  = 'Crear Carrera';
      document.getElementById('cNombre').value      = '';
      document.getElementById('cFecha').value       = '';
      document.getElementById('cModalidad').value   = 'Libre';
      document.getElementById('cTorneo').value      = '';
      document.getElementById('cUbicacion').value   = 'Autódromo Monterrey';
      document.getElementById('cDescripcion').value = '';
      document.getElementById('modalCarrera').style.display = 'flex';
    }

    function abrirEditar(id) {
      const c = todasLasCarreras.find(x => x.id === id);
      if (!c) return;
      editandoId = id;
      document.getElementById('modalTitulo').textContent = 'Editar Carrera';
      document.getElementById('btnGuardar').textContent  = 'Guardar Cambios';
      document.getElementById('cNombre').value      = c.nombre;
      document.getElementById('cFecha').value       = c.fecha ? c.fecha.split('T')[0] : '';
      document.getElementById('cModalidad').value   = c.modalidad || 'Libre';
      document.getElementById('cTorneo').value      = c.torneo || '';
      document.getElementById('cUbicacion').value   = c.ubicacion || 'Autódromo Monterrey';
      document.getElementById('cDescripcion').value = c.descripcion || '';
      document.getElementById('modalCarrera').style.display = 'flex';
    }

    function cerrarModal() {
      document.getElementById('modalCarrera').style.display = 'none';
    }

    async function guardarCarrera() {
      const nombre = document.getElementById('cNombre').value.trim();
      const fecha  = document.getElementById('cFecha').value;
      if (!nombre || !fecha) return mostrarToast('Nombre y fecha son obligatorios', 'error');

      const payload = {
        nombre, fecha,
        modalidad:   document.getElementById('cModalidad').value,
        torneo:      document.getElementById('cTorneo').value.trim() || null,
        ubicacion:   document.getElementById('cUbicacion').value.trim() || 'Autódromo Monterrey',
        descripcion: document.getElementById('cDescripcion').value.trim() || null,
      };

      const btn = document.getElementById('btnGuardar');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
      try {
        if (editandoId) {
          await apiFetch(`/carreras/${editandoId}`, { method: 'PUT', body: JSON.stringify(payload) });
          mostrarToast('Carrera actualizada');
        } else {
          await apiFetch('/carreras', { method: 'POST', body: JSON.stringify(payload) });
          mostrarToast('Carrera creada correctamente');
        }
        cerrarModal();
        cargar();
      } catch (err) { mostrarToast(err.message, 'error'); }
      finally { btn.disabled = false; btn.textContent = editandoId ? 'Guardar Cambios' : 'Crear Carrera'; }
    }

    async function eliminarCarrera(id, nombre, totalInscritos) {
      if (totalInscritos > 0) {
        mostrarToast(`No se puede eliminar: la carrera tiene ${totalInscritos} inscripción(es) registrada(s).`, 'error');
        return;
      }
      if (!confirm(`¿Eliminar la carrera "${nombre}"? Esta acción no se puede deshacer.`)) return;
      try {
        await apiFetch(`/carreras/${id}`, { method: 'DELETE' });
        mostrarToast('Carrera eliminada correctamente');
        cargar();
      } catch (err) { mostrarToast(err.message, 'error'); }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(); });
    cargar();
  </script>
</body>
</html>
