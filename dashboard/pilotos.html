<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pilotos — Autódromo Monterrey</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <!-- Sidebar idéntico -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-badge"><img src="../assets/logo.png" alt="Autódromo Monterrey" class="sidebar-logo-img" /></div>
    </div>
    <nav class="nav">
      <a href="index.html"         class="nav-link">Dashboard</a>
      <a href="pilotos.html"       class="nav-link activo">Pilotos</a>
      <a href="campeonatos.html"   class="nav-link">Campeonatos</a>
      <a href="inscripciones.html" class="nav-link">Inscripciones</a>
      <a href="reportes.html"      class="nav-link">Reportes</a>
      <a href="resultados.html"    class="nav-link">Resultados</a>
      <a href="formularios.html"   class="nav-link">Formularios</a>
      <a href="usuarios.html"      class="nav-link solo-admin" style="display:none">Usuarios</a>
    </nav>
    <div class="sidebar-footer">
      <div class="usuario-info">
        <div class="usuario-avatar" id="usuarioAvatar"></div>
        <div><div class="usuario-nombre" id="usuarioNombre"></div><div class="usuario-rol" id="usuarioRol"></div></div>
      </div>
      <button class="btn-logout" onclick="cerrarSesion()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between">
      <div>
        <h1 class="page-titulo">Pilotos</h1>
        <p class="page-sub" id="contadorPilotos">Cargando...</p>
      </div>
      <button class="btn-primario" id="btnNuevoPiloto" onclick="abrirModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nuevo Piloto
      </button>
    </div>

    <!-- Filtros -->
    <div class="barra-filtros">
      <input class="input" type="text" id="inputBuscar" placeholder="Buscar por nombre, número, categoría, email o teléfono..." oninput="filtrarPilotos()" />
      <select class="select" id="filtroLicencia" onchange="filtrarPilotos()">
        <option value="">Todos los estatus de licencia</option>
        <option>Vigente</option><option>Vencida</option><option>Suspendida</option>
      </select>
      <select class="select" id="filtroActividad" onchange="filtrarPilotos()">
        <option value="">Toda la actividad</option>
        <option value="activo">Con actividad reciente</option>
        <option value="inactivo">Sin actividad reciente</option>
        <option value="nuevo">Nunca ha competido</option>
      </select>
    </div>

    <div class="card tabla-card">
      <div class="tabla-wrap">
        <table class="tabla">
          <thead>
            <tr>
              <th>Piloto</th><th id="thSangre">Sangre</th><th id="thTelefono">Teléfono</th><th id="thNacionalidad">Nacionalidad</th><th>Licencia</th><th>Estatus</th><th>Última etapa</th><th>Carreras</th><th></th>
            </tr>
          </thead>
          <tbody id="tbodyPilotos">
            <tr><td colspan="8" class="td-vacio">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal piloto -->
  <div class="modal-overlay" id="modalPiloto" style="display:none">
    <div class="modal modal-lg">
      <div class="modal-header">
        <span class="modal-titulo" id="modalTitulo">Nuevo Piloto</span>
        <button class="modal-cerrar" onclick="cerrarModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="formPiloto" novalidate>
          <input type="hidden" id="pilotoId" />
          <div class="campo col-2">
            <label class="etiqueta">Nombre Completo *</label>
            <input class="input" id="fNombre" required placeholder="Nombre completo del piloto" />
          </div>
          <div class="grid-2" style="margin-top:12px">
            <div class="campo">
              <label class="etiqueta">Teléfono</label>
              <input class="input" id="fTelefono" placeholder="81 1234 5678" />
            </div>
            <div class="campo">
              <label class="etiqueta">Email</label>
              <input class="input" type="email" id="fEmail" placeholder="correo@ejemplo.com" />
            </div>
            <div class="campo">
              <label class="etiqueta">Tipo de Sangre *</label>
              <select class="select" id="fSangre" required>
                <option>O+</option><option>O-</option><option>A+</option><option>A-</option>
                <option>B+</option><option>B-</option><option>AB+</option><option>AB-</option>
              </select>
            </div>
            <div class="campo">
              <label class="etiqueta">Estatus Licencia</label>
              <select class="select" id="fEstatusLicencia">
                <option>Vigente</option><option>Vencida</option><option>Suspendida</option>
              </select>
            </div>
            <div class="campo">
              <label class="etiqueta">Número de Licencia</label>
              <input class="input" id="fLicencia" placeholder="LIC-000" />
            </div>
            <div class="campo">
              <label class="etiqueta">Nacionalidad</label>
              <select class="select" id="fNacionalidad">
                <option>Mexicana</option><option>Estadounidense</option><option>Canadiense</option>
                <option>Brasileña</option><option>Argentina</option><option>Otra</option>
              </select>
            </div>
            <div class="campo">
              <label class="etiqueta">Fecha de Nacimiento</label>
              <input class="input" type="date" id="fNacimiento" />
            </div>
            <div class="campo">
              <label class="etiqueta">Contacto de Emergencia</label>
              <input class="input" id="fEmergencia" placeholder="Nombre del familiar" />
            </div>
            <div class="campo">
              <label class="etiqueta">Tel. Emergencia</label>
              <input class="input" id="fTelEmergencia" placeholder="81 0000 0000" />
            </div>
            <div class="campo col-2">
              <label class="etiqueta">Dirección</label>
              <input class="input" id="fDireccion" placeholder="Calle, número, colonia" />
            </div>
            <div class="campo">
              <label class="etiqueta">Ciudad</label>
              <input class="input" id="fCiudad" placeholder="Monterrey" value="Monterrey" />
            </div>
            <div class="campo">
              <label class="etiqueta">Estado</label>
              <input class="input" id="fEstado" placeholder="Nuevo León" value="Nuevo León" />
            </div>
            <div class="campo col-2">
              <label class="etiqueta">Notas</label>
              <textarea class="textarea" id="fNotas" placeholder="Notas adicionales..."></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-secundario flex-1" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-primario flex-1" id="btnGuardar" onclick="guardarPiloto()">Registrar Piloto</button>
      </div>
    </div>
  </div>

  <!-- Menú de acciones (kebab), compartido por todas las filas -->
  <div class="menu-dropdown" id="menuAcciones"></div>

  <input type="hidden" id="fotoAdminId" />
  <input type="file" id="fotoAdminInput" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="subirFotoAdmin()" />

  <script src="../admin/config.js"></script>
  <script>
    requerirSesion();
    const usuario = obtenerUsuario();
    document.getElementById('usuarioAvatar').textContent = usuario.nombre[0].toUpperCase();
    document.getElementById('usuarioNombre').textContent = usuario.nombre;
    document.getElementById('usuarioRol').textContent    = usuario.rol;
    if (usuario.rol === 'admin') {
      document.querySelectorAll('.solo-admin').forEach(el => el.style.display = 'flex');
    }
    if (usuario.rol === 'torre') {
      document.getElementById('btnNuevoPiloto').style.display = 'none';
      document.querySelector('a[href="formularios.html"]').style.display = 'none';
      document.getElementById('thSangre').textContent = 'Número';
      document.getElementById('thTelefono').textContent = 'Categoría';
      document.getElementById('thNacionalidad').textContent = '';
    }

    let pilotos = [];

    async function cargarPilotos() {
      try {
        pilotos = await apiFetch('/pilotos');
        renderizarPilotos(pilotos);
        document.getElementById('contadorPilotos').textContent = `${pilotos.length} piloto(s) registrado(s)`;
      } catch (err) {
        mostrarToast(err.message, 'error');
      }
    }

    function renderizarPilotos(lista) {
      const tbody = document.getElementById('tbodyPilotos');
      if (lista.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="td-vacio">No se encontraron pilotos</td></tr>';
        return;
      }
      tbody.innerHTML = lista.map(p => {
        const inactivo  = p.total_carreras > 0 && p.etapas_recientes === 0;
        const sinEtapas = p.total_carreras === 0;
        return `
        <tr>
          <td>
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:32px;height:32px;border-radius:50%;background:${p.foto_perfil ? `url('${UPLOADS_BASE}${p.foto_perfil}') center/cover` : (inactivo ? 'rgba(245,158,11,0.12)' : 'rgba(37,99,235,0.15)')};border:1px solid ${inactivo ? 'rgba(245,158,11,0.3)' : 'rgba(37,99,235,0.3)'};display:flex;align-items:center;justify-content:center;color:${inactivo ? 'var(--amarillo)' : 'var(--rojo)'};font-family:'Bebas Neue';font-size:1rem;flex-shrink:0">${p.foto_perfil ? '' : esc(p.nombre_completo[0])}</div>
              <div>
                <div style="display:flex;align-items:center;gap:6px">
                  <span style="font-weight:600">${esc(p.nombre_completo)}</span>
                  ${p.numero_piloto ? `<span style="font-family:'Bebas Neue';font-size:0.85rem;padding:1px 7px;border-radius:5px;${p.numero_piloto===1?'background:rgba(37,99,235,0.2);color:var(--rojo);border:1px solid rgba(37,99,235,0.4)':'background:var(--dark);color:var(--muted);border:1px solid var(--borde)'}">#${p.numero_piloto}</span>` : ''}
                </div>
                ${p.email ? `<div style="font-size:0.75rem;color:var(--muted)">${esc(p.email)}</div>` : ''}
                ${p.anio_inicio_autodromo ? `<div style="font-size:0.7rem;color:var(--azul);margin-top:2px">🏁 ${new Date().getFullYear() - p.anio_inicio_autodromo + 1} año(s) corriendo en el autódromo</div>` : ''}
                ${inactivo  ? `<div style="font-size:0.68rem;color:var(--amarillo);display:flex;align-items:center;gap:3px;margin-top:2px"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Sin actividad reciente</div>` : ''}
                ${sinEtapas ? `<div style="font-size:0.68rem;color:var(--muted);margin-top:2px">Nunca ha competido</div>` : ''}
              </div>
            </div>
          </td>
          <td>${usuario.rol === 'torre'
            ? `<span style="font-family:'Bebas Neue';font-size:1.3rem;color:var(--rojo)">${p.numero_piloto ? '#'+p.numero_piloto : '—'}</span>`
            : `<span style="font-family:'Bebas Neue';font-size:1.1rem;color:var(--rojo);display:flex;align-items:center;gap:4px">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                ${esc(p.tipo_sangre)}
              </span>`}</td>
          <td style="color:var(--muted)">${usuario.rol === 'torre' ? esc(p.ultima_categoria || '—') : esc(p.telefono || '—')}</td>
          <td style="color:var(--muted)">${usuario.rol === 'torre' ? '<span style="color:var(--muted)">—</span>' : esc(p.nacionalidad)}</td>
          <td style="color:var(--muted);font-size:0.8rem">${esc(p.numero_licencia || '—')}</td>
          <td>${badgeEstatus(p.estatus_licencia)}</td>
          <td style="font-size:0.8rem;color:var(--muted)">${formatFecha(p.ultima_carrera_fecha) || '—'}</td>
          <td style="font-family:'Bebas Neue';font-size:1.1rem;color:var(--muted)">${p.total_carreras}</td>
          <td>
            <div style="display:flex;gap:6px;justify-content:flex-end">
              ${usuario.rol !== 'torre' ? `
                <button class="btn-primario" style="padding:6px 12px;font-size:0.7rem" onclick="irAInscribir(${p.id})">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  Inscribir
                </button>
              ` : ''}
              <button class="btn-kebab" onclick="abrirMenuAcciones(${p.id}, this)" title="Más acciones">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>
              </button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    function filtrarPilotos() {
      const buscar    = document.getElementById('inputBuscar').value.toLowerCase();
      const estatus   = document.getElementById('filtroLicencia').value;
      const actividad = document.getElementById('filtroActividad').value;
      const filtrados = pilotos.filter(p => {
        const matchBuscar = !buscar ||
          p.nombre_completo.toLowerCase().includes(buscar) ||
          (p.email || '').toLowerCase().includes(buscar) ||
          (p.telefono || '').includes(buscar) ||
          (p.numero_licencia || '').toLowerCase().includes(buscar) ||
          String(p.numero_piloto || '').includes(buscar) ||
          (p.ultima_categoria || '').toLowerCase().includes(buscar);
        const matchEstatus = !estatus || p.estatus_licencia === estatus;
        const matchActividad =
          !actividad ||
          (actividad === 'activo'   && p.etapas_recientes > 0) ||
          (actividad === 'inactivo' && p.total_carreras > 0 && p.etapas_recientes === 0) ||
          (actividad === 'nuevo'    && p.total_carreras === 0);
        return matchBuscar && matchEstatus && matchActividad;
      });
      document.getElementById('contadorPilotos').textContent =
        `${filtrados.length} de ${pilotos.length} piloto(s)`;
      renderizarPilotos(filtrados);
    }

    function abrirModal(piloto = null) {
      document.getElementById('pilotoId').value     = piloto ? piloto.id : '';
      document.getElementById('modalTitulo').textContent = piloto ? 'Editar Piloto' : 'Nuevo Piloto';
      document.getElementById('btnGuardar').textContent  = piloto ? 'Guardar Cambios' : 'Registrar Piloto';
      document.getElementById('fNombre').value       = piloto?.nombre_completo || '';
      document.getElementById('fTelefono').value     = piloto?.telefono || '';
      document.getElementById('fEmail').value        = piloto?.email || '';
      document.getElementById('fSangre').value       = piloto?.tipo_sangre || 'O+';
      document.getElementById('fEstatusLicencia').value = piloto?.estatus_licencia || 'Vigente';
      document.getElementById('fLicencia').value     = piloto?.numero_licencia || '';
      document.getElementById('fNacionalidad').value = piloto?.nacionalidad || 'Mexicana';
      document.getElementById('fNacimiento').value   = piloto?.fecha_nacimiento?.split('T')[0] || '';
      document.getElementById('fEmergencia').value   = piloto?.contacto_emergencia || '';
      document.getElementById('fTelEmergencia').value= piloto?.telefono_emergencia || '';
      document.getElementById('fDireccion').value    = piloto?.direccion || '';
      document.getElementById('fCiudad').value       = piloto?.ciudad || 'Monterrey';
      document.getElementById('fEstado').value       = piloto?.estado || 'Nuevo León';
      document.getElementById('fNotas').value        = piloto?.notas || '';
      document.getElementById('modalPiloto').style.display = 'flex';
    }

    async function editarPiloto(id) {
      try {
        const piloto = await apiFetch(`/pilotos/${id}`);
        abrirModal(piloto);
      } catch (err) { mostrarToast(err.message, 'error'); }
    }

    function cerrarModal() {
      document.getElementById('modalPiloto').style.display = 'none';
    }

    async function guardarPiloto() {
      const id     = document.getElementById('pilotoId').value;
      const nombre = document.getElementById('fNombre').value.trim();
      const sangre = document.getElementById('fSangre').value;
      if (!nombre) return mostrarToast('El nombre es obligatorio', 'error');
      if (!sangre) return mostrarToast('El tipo de sangre es obligatorio', 'error');

      const btn = document.getElementById('btnGuardar');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Guardando...';

      const datos = {
        nombre_completo:     nombre,
        telefono:            document.getElementById('fTelefono').value || null,
        email:               document.getElementById('fEmail').value || null,
        tipo_sangre:         sangre,
        estatus_licencia:    document.getElementById('fEstatusLicencia').value,
        numero_licencia:     document.getElementById('fLicencia').value || null,
        nacionalidad:        document.getElementById('fNacionalidad').value,
        fecha_nacimiento:    document.getElementById('fNacimiento').value || null,
        contacto_emergencia: document.getElementById('fEmergencia').value || null,
        telefono_emergencia: document.getElementById('fTelEmergencia').value || null,
        direccion:           document.getElementById('fDireccion').value || null,
        ciudad:              document.getElementById('fCiudad').value || null,
        estado:              document.getElementById('fEstado').value || null,
        notas:               document.getElementById('fNotas').value || null,
      };

      try {
        if (id) {
          await apiFetch(`/pilotos/${id}`, { method: 'PUT', body: JSON.stringify(datos) });
          mostrarToast('Piloto actualizado correctamente');
        } else {
          await apiFetch('/pilotos', { method: 'POST', body: JSON.stringify(datos) });
          mostrarToast('Piloto registrado correctamente');
        }
        cerrarModal();
        cargarPilotos();
      } catch (err) {
        mostrarToast(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = id ? 'Guardar Cambios' : 'Registrar Piloto';
      }
    }

    async function toggleNum1(id, esActual1) {
      const accion = esActual1 ? 'restaurar su número anterior' : 'asignar el #1 a este piloto';
      if (!confirm(`¿Confirmar ${accion}?`)) return;
      try {
        const res = await apiFetch(`/pilotos/${id}/numero-uno`, { method: 'PATCH' });
        mostrarToast(res.mensaje || 'Número actualizado');
        cargarPilotos();
      } catch (err) { mostrarToast(err.message, 'error'); }
    }

    function irAInscribir(pilotoId) {
      window.location.href = `inscripciones.html?piloto_id=${pilotoId}`;
    }

    async function eliminarPiloto(id) {
      const nombre = pilotos.find(x => x.id === id)?.nombre_completo || 'este piloto';
      if (!confirm(`¿Desactivar al piloto "${nombre}"?\n\nEl piloto quedará inactivo y no aparecerá en listas, pero sus inscripciones se conservan.`)) return;
      try {
        await apiFetch(`/pilotos/${id}`, { method: 'DELETE' });
        mostrarToast(`${nombre} desactivado`);
        cargarPilotos();
      } catch (err) { mostrarToast(err.message, 'error'); }
    }

    async function resetPasswordPortal(id) {
      const nombre = pilotos.find(x => x.id === id)?.nombre_completo || 'este piloto';
      const nueva = prompt(`Restablecer contraseña del Portal para:\n${nombre}\n\nEscribe la nueva contraseña (mínimo 6 caracteres):`);
      if (!nueva) return;
      if (nueva.length < 6) return mostrarToast('La contraseña debe tener al menos 6 caracteres', 'error');
      try {
        const res = await apiFetch(`/pilotos/${id}/reset-password`, { method: 'PATCH', body: JSON.stringify({ password: nueva }) });
        mostrarToast(res.mensaje || 'Contraseña restablecida');
      } catch (err) { mostrarToast(err.message, 'error'); }
    }

    async function subirFotoAdmin() {
      const id = document.getElementById('fotoAdminId').value;
      const input = document.getElementById('fotoAdminInput');
      const file = input.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) { input.value = ''; return mostrarToast('La imagen no puede pesar más de 5MB', 'error'); }
      try {
        const fd = new FormData();
        fd.append('foto', file);
        const res = await fetch(`${API_URL}/pilotos/${id}/foto`, {
          method: 'PATCH',
          headers: { 'Authorization': `Bearer ${obtenerToken()}` },
          body: fd,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al subir la foto');
        mostrarToast('Foto de perfil actualizada');
        cargarPilotos();
      } catch (err) { mostrarToast(err.message, 'error'); }
      finally { input.value = ''; }
    }

    // ── Menú de acciones (kebab) ────────────────────────────────────────────
    let menuAbiertoBtn = null;

    function cerrarMenuAcciones() {
      document.getElementById('menuAcciones').classList.remove('abierto');
      if (menuAbiertoBtn) menuAbiertoBtn.classList.remove('activo');
      menuAbiertoBtn = null;
    }

    function abrirMenuAcciones(id, btn) {
      if (menuAbiertoBtn === btn) { cerrarMenuAcciones(); return; }
      cerrarMenuAcciones();
      const p = pilotos.find(x => x.id === id);
      if (!p) return;

      const items = [];
      if (usuario.rol !== 'torre') {
        items.push(`<button class="menu-item" onclick="editarPiloto(${id});cerrarMenuAcciones()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Editar
        </button>`);
        if (p.numero_piloto) {
          items.push(`<button class="menu-item dorado" onclick="toggleNum1(${id},${p.numero_piloto===1});cerrarMenuAcciones()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0V4z"/><path d="M7 6H4a2 2 0 0 0 2 4M17 6h3a2 2 0 0 1-2 4"/></svg>
            ${p.numero_piloto === 1 ? `Restaurar #${p.numero_piloto_anterior || '?'}` : 'Asignar #1'}
          </button>`);
        }
      }
      if (usuario.rol === 'admin' || usuario.rol === 'inscripciones') {
        items.push(`<button class="menu-item" onclick="document.getElementById('fotoAdminId').value=${id};document.getElementById('fotoAdminInput').click();cerrarMenuAcciones()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Subir foto de perfil
        </button>`);
      }
      if (usuario.rol === 'admin') {
        items.push(`<button class="menu-item" onclick="resetPasswordPortal(${id});cerrarMenuAcciones()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Portal del Piloto
        </button>`);
        items.push(`<div class="menu-divider"></div>`);
        items.push(`<button class="menu-item peligro" onclick="eliminarPiloto(${id});cerrarMenuAcciones()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/></svg>
          Eliminar
        </button>`);
      }
      if (items.length === 0) return;

      const menu = document.getElementById('menuAcciones');
      menu.innerHTML = items.join('');
      menu.classList.add('abierto');
      btn.classList.add('activo');
      menuAbiertoBtn = btn;

      const rectBtn  = btn.getBoundingClientRect();
      const rectMenu = menu.getBoundingClientRect();
      let top  = rectBtn.bottom + 6;
      let left = rectBtn.right - rectMenu.width;
      if (left < 8) left = 8;
      if (top + rectMenu.height > window.innerHeight - 8) top = rectBtn.top - rectMenu.height - 6;
      menu.style.top = `${top}px`;
      menu.style.left = `${left}px`;
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('.btn-kebab') && !e.target.closest('#menuAcciones')) cerrarMenuAcciones();
    });
    window.addEventListener('scroll', cerrarMenuAcciones, true);

    // Cerrar modal/menú con Escape
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { cerrarModal(); cerrarMenuAcciones(); } });

    cargarPilotos();
  </script>
</body>
</html>
